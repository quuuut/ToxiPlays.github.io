
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTML Renderer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8f440;
    --accent2: #ff4d6d;
    --text-dim: #3a3a55;
    --text-mid: #6a6a9a;
    --text-bright: #c8c8e8;
    --active-word: #e8f440;
    --active-line: rgba(232,244,64,0.06);
  }

  body {
    background: var(--bg);
    color: var(--text-bright);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    width: 100%;
    max-width: 780px;
    padding: 3rem 2rem 1rem;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
  }

  header span {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-mid);
    text-transform: uppercase;
  }

  /* Upload zone */
  .upload-panel {
    width: 100%;
    max-width: 780px;
    padding: 0 2rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .drop-zone {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 1.5rem;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    min-height: 90px;
    justify-content: center;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,244,64,0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-zone .label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-mid);
  }

  .drop-zone .hint {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .drop-zone .filename {
    font-size: 0.85rem;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Player */
  .player-bar {
    width: 100%;
    max-width: 780px;
    padding: 0 2rem 1.5rem;
  }

  .player-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .btn-play {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-play:hover { background: #f5ff6e; }
  .btn-play:active { transform: scale(0.94); }
  .btn-play svg { fill: #0a0a0f; }

  .time-display {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--text-mid);
    flex-shrink: 0;
    min-width: 90px;
  }

  .progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
    pointer-events: none;
  }

  .progress-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    left: 0%;
    transition: left 0.1s linear;
  }

  input[type="range"].seek {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type="range"].seek::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  /* Lyrics */
  .lyrics-outer {
    width: 100%;
    max-width: 780px;
    padding: 0 2rem 4rem;
    flex: 1;
  }

  #lyrics-container {
    height: 60vh;
    overflow-y: auto;
    scrollbar-width: none;
    padding: 2rem 0;
    scroll-behavior: smooth;
  }

  #lyrics-container::-webkit-scrollbar { display: none; }

  .lyric-line {
    padding: 0.5rem 0;
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    line-height: 1.7;
    color: var(--text-dim);
    transition: color 0.3s;
    margin-bottom: 0.2rem;
    display: block;
    max-width: 85%;
    word-break: break-word;
  }

  .lyric-line.active-line {
    color: var(--text-mid);
  }

  .lyric-line[data-agent="v2"] {
    text-align: right;
    margin-left: auto;
  }

  .lyric-span {
    display: inline-block;
    transition: color 0.08s, text-shadow 0.08s;
    cursor: pointer;
    transform: translateY(2px);
    vertical-align: baseline;
    word-break: keep-all;
  }

  .lyric-span:hover {
    color: var(--text-bright);
  }

  @keyframes word-jitter {
    0%   { transform: translateY(2px); }
    40%  { transform: translateY(5px); }
    100% { transform: translateY(5px); }
  }

  @keyframes float-up {
    from { transform: translateY(5px); }
    to   { transform: translateY(0px); }
  }

  .lyric-span.active {
    color: var(--active-word);
    text-shadow: 0 0 20px rgba(232,244,64,0.4);
    animation:
      word-jitter 60ms linear forwards,
      float-up var(--word-dur, 0.3s) cubic-bezier(0.22, 1, 0.36, 1) forwards 60ms;
  }

  .lyric-span.past {
    color: var(--text-bright);
    transform: translateY(0px);
  }

  /* Long-held word glow animation */
  @keyframes word-glow {
    0%   { text-shadow: 0 0 10px rgba(232,244,64,0.5); }
    50%  { text-shadow: 0 0 30px rgba(232,244,64,0.9), 0 0 60px rgba(232,244,64,0.4); }
    100% { text-shadow: 0 0 10px rgba(232,244,64,0.5); }
  }

  .lyric-span.active.long-word {
    animation:
      word-jitter 60ms linear forwards,
      float-up var(--word-dur, 0.3s) cubic-bezier(0.22, 1, 0.36, 1) forwards 60ms,
      word-glow 0.8s ease-in-out infinite 60ms;
  }

  /* Word group: wraps multi-syllable spans to prevent mid-word line breaks */
  .word-group {
    display: inline-block;
    white-space: nowrap;
    vertical-align: baseline;
  }

  /* Ad-lib lines */
  .lyric-line.adlib {
    font-size: 0.9em;
    opacity: 0.6;
    margin-top: -0.4rem;
    padding-top: 0;
    display: block;
  }

  /* Instrumental break bar */
  .break-bar {
    margin: 0.8rem 0;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .break-bar-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
    white-space: nowrap;
  }

  .break-bar-track {
    flex: 1;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .break-bar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--accent);
    transition: width 0.1s linear;
  }

  .btn-render {
    width: 36px;
    height: 36px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-render:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-render:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-render.rendering { border-color: var(--accent2); color: var(--accent2); animation: pulse 1s infinite; }

  /* Render progress overlay */
  #render-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.92);
    z-index: 2000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }
  #render-overlay.active { display: flex; }
  #render-overlay .render-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  #render-overlay .render-sub {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-mid);
  }
  #render-overlay .render-bar-track {
    width: 320px;
    height: 3px;
    background: var(--border);
    position: relative;
  }
  #render-overlay .render-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }
  #render-overlay .render-cancel {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
  }
  #render-overlay .render-cancel:hover { color: var(--accent2); }
  .songwriter-credit {
    font-size: 0.75em;
    opacity: 0.45;
    color: var(--text-bright);
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
    display: block;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
    color: var(--text-dim);
  }

  .empty-state .big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 0.1em;
    line-height: 1;
    color: var(--border);
  }

  .empty-state .sub {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* divider */
  .divider {
    width: 100%;
    max-width: 780px;
    padding: 0 2rem;
    margin-bottom: 1rem;
  }
  .divider-line {
    height: 1px;
    background: var(--border);
  }

  audio { display: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .recording-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 1s infinite;
    margin-right: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>TTML Renderer</h1>
  <span>v1.5 by <a target="spicy" href="https://spicylyrics.com/toxi">@toxi</a></span>
</header>

<div class="upload-panel">
  <div class="drop-zone" id="ttml-drop">
    <input type="file" id="ttml-input" accept=".ttml,.xml">
    <div class="label">Lyrics file</div>
    <div class="hint" id="ttml-hint">Drop .ttml here</div>
    <div class="filename" id="ttml-name" style="display:none"></div>
  </div>
  <div class="drop-zone" id="audio-drop">
    <input type="file" id="audio-input" accept="audio/*">
    <div class="label">Audio file</div>
    <div class="hint" id="audio-hint">Drop audio here</div>
    <div class="filename" id="audio-name" style="display:none"></div>
  </div>
</div>

<div class="divider"><div class="divider-line"></div></div>

<div class="player-bar">
  <div class="player-inner">
    <div class="controls">
      <button class="btn-play" id="btn-play" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16">
          <polygon id="play-icon" points="4,2 14,8 4,14"/>
        </svg>
      </button>
      <div class="time-display">
        <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
      </div>
      <input type="range" class="seek" id="seek-bar" min="0" max="100" value="0" step="0.01" disabled>
      <button class="btn-render" id="btn-render" disabled title="Export to video">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 5-10 5V2z" fill="currentColor"/>
          <rect x="1" y="11.5" width="12" height="1.5" fill="currentColor" rx="0.75"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="lyrics-outer">
  <div id="lyrics-container">
    <div class="empty-state">
      <div class="big">LYRICS</div>
      <div class="sub">Upload a .ttml file to begin</div>
    </div>
  </div>
</div>

<div id="render-overlay">
  <div class="render-title">Rendering</div>
  <div class="render-sub" id="render-sub">Preparing…</div>
  <div class="render-bar-track"><div class="render-bar-fill" id="render-bar-fill"></div></div>
  <button class="render-cancel" id="render-cancel">Cancel</button>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let spans = []; // { el, begin, end, duration, isLong, lineEl }
let lines = []; // { el, begin, end }
let breakBars = []; // { el, fillEl, start, end, gap }
let rafId = null;
let activeSpanSet = new Set();
let activeLineSet = new Set();
const btnPlay = document.getElementById('btn-play');
const playIcon = document.getElementById('play-icon');

// ─── Helpers ──────────────────────────────────────────────────────────────────
function parseTime(str) {
  if (!str) return 0;
  // formats: HH:MM:SS.mmm  MM:SS.mmm  SS.mmm
  const parts = str.split(':');
  let secs = 0;
  if (parts.length === 3) {
    secs = (+parts[0]) * 3600 + (+parts[1]) * 60 + parseFloat(parts[2]);
  } else if (parts.length === 2) {
    secs = (+parts[0]) * 60 + parseFloat(parts[1]);
  } else {
    secs = parseFloat(parts[0]);
  }
  return secs;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ─── TTML Parser ──────────────────────────────────────────────────────────────
function parseTTML(xmlString) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlString, 'text/xml');

  const ns = 'http://www.w3.org/ns/ttml';
  const ttmNS = 'http://www.w3.org/ns/ttml#metadata';

  const container = document.getElementById('lyrics-container');
  container.innerHTML = '';
  spans = [];
  lines = [];
  breakBars = [];

  // ── Check for XML parse error ──
  const xmlErr = doc.querySelector('parsererror');
  if (xmlErr) {
    const msg = xmlErr.textContent.split('\n')[0].trim();
    container.innerHTML = `<div class="empty-state">
      <div class="big">INVALID FILE</div>
      <div class="sub">The file could not be read as XML.<br><em>${msg}</em><br><br>Make sure the file is a valid .ttml file and try again.</div>
    </div>`;
    return;
  }

  // ── Find <p> elements — try namespaced first, then unqualified fallback ──
  let pEls = doc.getElementsByTagNameNS(ns, 'p');
  if (pEls.length === 0) pEls = doc.getElementsByTagName('p');
  if (pEls.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="big">NO LYRICS FOUND</div>
      <div class="sub">The file was read successfully but contains no lyric lines.<br>Check that it is a TTML lyric file (not a subtitle or caption file) and try again.</div>
    </div>`;
    return;
  }

  Array.from(pEls).forEach((p) => {
    const agent = p.getAttributeNS(ttmNS, 'agent') || p.getAttribute('ttm:agent') || 'v1';
    const lineBegin = parseTime(p.getAttribute('begin'));
    const lineEnd   = parseTime(p.getAttribute('end'));

    // ── Collect all timed tokens from this <p>, preserving inter-span text nodes ──
    // Each token is either:
    //   { type:'text', text }            — a raw text node (space/punctuation)
    //   { type:'span', begin, end, text, wordDuration } — a timed word span
    const tokens = [];

    function collectTokens(node, forceAdlib) {
      node.childNodes.forEach(child => {
        if (child.nodeType === Node.TEXT_NODE) {
          if (child.textContent) tokens.push({ type: 'text', text: child.textContent, isAdlib: !!forceAdlib });
        } else if (child.nodeType === Node.ELEMENT_NODE && child.localName === 'span') {
          const b = child.getAttribute('begin');
          const e = child.getAttribute('end');
          // Detect x-bg (background vocal / ad-lib container) — always recurse into it
          const role = child.getAttributeNS(ttmNS, 'role') || child.getAttribute('ttm:role') || '';
          const isXBg = role === 'x-bg';
          // Skip non-lyric annotation spans (x-roman, x-translation, etc.)
          if (role && role !== 'x-bg') return;
          if (isXBg) {            // Recurse, flagging all children as ad-lib
            collectTokens(child, true);
          } else if (b && e) {
            const begin = parseTime(b), end = parseTime(e);
            const text = child.textContent;
            tokens.push({ type: 'span', begin, end, wordDuration: end - begin, text, isAdlib: !!forceAdlib });
          } else {
            // Other structural span — recurse, inherit adlib flag
            collectTokens(child, forceAdlib);
          }
        }
      });
    }
    collectTokens(p, false);

    // ── Split tokens into mainTokens and adlibTokens using the isAdlib flag ──
    // x-bg spans are already flagged isAdlib=true by collectTokens.
    // For non-x-bg files that use parentheses in text, fall back to paren detection.
    const hasXBgAdlib = tokens.some(t => t.isAdlib);

    let mainTokens, adlibTokens;
    if (hasXBgAdlib) {
      // Clean split: main = non-adlib tokens, adlib = adlib tokens
      mainTokens  = tokens.filter(t => !t.isAdlib);
      adlibTokens = tokens.filter(t => t.isAdlib);
      // Trim trailing text-only tokens from main (spaces left over before adlib)
      while (mainTokens.length && mainTokens[mainTokens.length - 1].type === 'text') mainTokens.pop();
    } else {
      // Paren-based fallback
      const fullText = tokens.map(t => t.text).join('').trim();
      const entireLineIsAdlib = fullText.startsWith('(');
      let splitIdx = -1;
      for (let i = 0; i < tokens.length; i++) {
        const tok = tokens[i];
        if (tok.text && tok.text.includes('(')) { splitIdx = i; break; }
      }
      if (entireLineIsAdlib) {
        mainTokens = []; adlibTokens = tokens;
      } else if (splitIdx >= 0) {
        mainTokens = tokens.slice(0, splitIdx);
        adlibTokens = tokens.slice(splitIdx);
        while (mainTokens.length && mainTokens[mainTokens.length - 1].type === 'text') mainTokens.pop();
      } else {
        mainTokens = tokens; adlibTokens = [];
      }
    }

    // ── Build a DOM line element from a token list ──
    // Groups consecutive span tokens that have NO whitespace text node between them
    // into a <span class="word-group"> so the browser never breaks mid-syllable.
    function buildLine(tokenList, isAdlib) {
      const lineEl = document.createElement('div');
      lineEl.className = 'lyric-line' + (isAdlib ? ' adlib' : '');
      lineEl.dataset.agent = agent;

      // Compute line timing from its span tokens
      const spanToks = tokenList.filter(t => t.type === 'span');
      const lb = spanToks.length ? spanToks[0].begin : lineBegin;
      const le = spanToks.length ? spanToks[spanToks.length - 1].end : lineEnd;
      lineEl.dataset.begin = lb;
      lineEl.dataset.end   = le;

      // Strip parens from adlib lines always (x-bg or paren-fallback)
      const processedTokens = isAdlib
        ? stripParensFromTokens(tokenList)
        : tokenList;

      // Group consecutive span tokens (no whitespace between) into word-group wrappers
      // so line-breaking never splits a multi-syllable word mid-span.
      // We walk tokens and whenever we see span-span adjacency (no space text node between),
      // we collect them into a group.
      let i = 0;
      while (i < processedTokens.length) {
        const tok = processedTokens[i];
        if (tok.type === 'text') {
          lineEl.appendChild(document.createTextNode(tok.text));
          i++;
        } else {
          // Collect a run of spans separated only by empty/no text nodes
          const group = [tok];
          let j = i + 1;
          // Also end the group if this span's own text ends with whitespace
          if (!/\s$/.test(tok.text)) {
            while (j < processedTokens.length) {
              const next = processedTokens[j];
              if (next.type === 'text') {
                if (/\S/.test(next.text)) break; // real content = group ends
                const afterSpace = processedTokens[j + 1];
                if (!afterSpace || afterSpace.type !== 'span') break;
                break; // whitespace between spans = word boundary
              } else {
                // Adjacent span — check if previous ended with space before adding
                group.push(next);
                j++;
                if (/\s$/.test(next.text)) break; // trailing space = word boundary
              }
            }
          }

          if (group.length === 1) {
            // Single span — emit directly
            appendSpanWithTrail(lineEl, group[0]);
          } else {
            // Multi-syllable word — wrap in a non-breaking group
            appendGroupWithTrail(lineEl, group);
          }
          i = j;
        }
      }

      return { lineEl, begin: lb, end: le };
    }

    function makeSpanEl(tok) {
      const spanEl = document.createElement('span');
      spanEl.className = 'lyric-span';
      spanEl.dataset.begin = tok.begin;
      spanEl.dataset.end   = tok.end;
      spanEl.dataset.duration = tok.wordDuration;
      // Strip trailing whitespace from display text — it will be emitted as a
      // separate text node after the span so inline-block gaps render correctly.
      spanEl.textContent = tok.text.trimEnd();
      spanEl.style.setProperty('--word-dur', tok.wordDuration.toFixed(3) + 's');
      spanEl.addEventListener('click', () => seekToTime(tok.begin));
      spans.push({ el: spanEl, begin: tok.begin, end: tok.end, duration: tok.wordDuration, lineEl: null /* set below */ });
      return spanEl;
    }

    // Emit a span (or word-group) plus any trailing space as a sibling text node
    function appendSpanWithTrail(parent, tok) {
      const el = makeSpanEl(tok);
      parent.appendChild(el);
      const trail = tok.text.match(/\s+$/);
      if (trail) parent.appendChild(document.createTextNode(trail[0]));
    }

    function appendGroupWithTrail(parent, group) {
      const lastTok = group[group.length - 1];
      const trail = lastTok.text.match(/\s+$/);
      if (group.length === 1) {
        appendSpanWithTrail(parent, group[0]);
      } else {
        const wrapper = document.createElement('span');
        wrapper.className = 'word-group';
        group.forEach(t => wrapper.appendChild(makeSpanEl(t)));
        parent.appendChild(wrapper);
        if (trail) parent.appendChild(document.createTextNode(trail[0]));
      }
    }

    // Build main line
    if (mainTokens.some(t => t.type === 'span')) {
      const { lineEl, begin, end } = buildLine(mainTokens, false);
      // Patch lineEl reference on spans added during this buildLine call
      lineEl.querySelectorAll('.lyric-span').forEach(el => {
        const s = spans.find(s => s.el === el && s.lineEl === null);
        if (s) s.lineEl = lineEl;
      });
      container.appendChild(lineEl);
      lines.push({ el: lineEl, begin, end });
    }

    // Build adlib line
    if (adlibTokens.some(t => t.type === 'span')) {
      const { lineEl, begin, end } = buildLine(adlibTokens, true);
      lineEl.querySelectorAll('.lyric-span').forEach(el => {
        const s = spans.find(s => s.el === el && s.lineEl === null);
        if (s) s.lineEl = lineEl;
      });
      container.appendChild(lineEl);
      lines.push({ el: lineEl, begin, end });
    }
  });

  // Compute long-word threshold: median word duration * 3
  if (spans.length > 0) {
    const durations = spans.map(s => s.duration).sort((a, b) => a - b);
    const median = durations[Math.floor(durations.length / 2)];
    const threshold = median * 3;
    spans.forEach(s => { s.isLong = s.duration >= threshold; });
  }

  // Insert break bars between lines with 5+ second gaps
  breakBars = [];
  const BREAK_THRESHOLD = 5;
  // lines are in DOM order; find gaps between consecutive line ends and starts
  // We need to work from the container's actual children order
  // Build a sorted list of { end, nextBegin, insertAfterEl }
  for (let i = 0; i < lines.length - 1; i++) {
    const gap = lines[i + 1].begin - lines[i].end;
    if (gap >= BREAK_THRESHOLD) {
      const barEl = document.createElement('div');
      barEl.className = 'break-bar';
      const secs = Math.round(gap);
      barEl.innerHTML = `<div class="break-bar-label">${secs}s</div><div class="break-bar-track"><div class="break-bar-fill"></div></div>`;
      // Insert into DOM after lines[i].el
      lines[i].el.after(barEl);
      breakBars.push({
        el: barEl,
        fillEl: barEl.querySelector('.break-bar-fill'),
        start: lines[i].end,
        end: lines[i + 1].begin,
        gap
      });
    }
  }

  if (lines.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="big">NO TIMED LINES</div>
      <div class="sub">The file was parsed but contained no word-timed lyric lines.<br>This player requires a TTML file with word-level timing (e.g. from Apple Music). Check that the correct file was uploaded.</div>
    </div>`;
  }

  // Extract <songwriter> tags and append credit line
  const songwriters = Array.from(doc.getElementsByTagName('songwriter'))
    .map(el => el.textContent.trim())
    .filter(Boolean);
  if (songwriters.length > 0) {
    const credit = document.createElement('div');
    credit.className = 'songwriter-credit';
    credit.textContent = 'Written by: ' + songwriters.join(', ');
    container.appendChild(credit);
  }
}

// Strip outer parentheses from a token list's text content
function stripParensFromTokens(tokenList) {
  const result = tokenList.map(t => ({ ...t }));
  // Strip leading paren from first token that contains one
  for (let i = 0; i < result.length; i++) {
    const stripped = result[i].text.replace(/^\s*\(\s*/, '');
    if (stripped !== result[i].text) { result[i].text = stripped; break; }
  }
  // Strip trailing paren from last token that contains one
  for (let i = result.length - 1; i >= 0; i--) {
    const stripped = result[i].text.replace(/\s*\)\s*$/, '');
    if (stripped !== result[i].text) { result[i].text = stripped; break; }
  }
  // Scrub any remaining stray parens from all tokens (e.g. "(Yuh)" as a whole span text)
  result.forEach(t => { t.text = t.text.replace(/[()]/g, ''); });
  return result;
}

// Seek to a specific time
function seekToTime(t) {
  pausedAt = Math.max(0, Math.min(t, duration));
  activeSpanSet = new Set();
  activeLineSet = new Set();
  // Reset highlights
  spans.forEach(s => {
    s.el.classList.remove('active', 'long-word');
    if (s.end <= pausedAt) s.el.classList.add('past');
    else s.el.classList.remove('past');
  });
  lines.forEach(l => l.el.classList.remove('active-line'));
  breakBars.forEach(b => { b.fillEl.style.width = '0%'; b.el.style.opacity = '0.3'; });
  document.getElementById('seek-bar').value = pausedAt;
  document.getElementById('current-time').textContent = formatTime(pausedAt);
  if (isPlaying) startPlayback(pausedAt);
}
// ─── Sync Loop (supports overlapping lines) ───────────────────────────────────
function syncLoop() {
  const t = isPlaying ? (actx.currentTime - startedAt) : pausedAt;

  // ── Spans: find ALL spans active right now ──
  const newActiveSpans = new Set();
  for (let i = 0; i < spans.length; i++) {
    if (t >= spans[i].begin && t < spans[i].end) newActiveSpans.add(i);
  }

  // Spans that just became inactive → mark past
  for (const i of activeSpanSet) {
    if (!newActiveSpans.has(i)) {
      spans[i].el.classList.remove('active', 'long-word');
      // Only mark past if this span has actually ended
      if (t >= spans[i].end) spans[i].el.classList.add('past');
    }
  }
  // Spans that just became active
  for (const i of newActiveSpans) {
    if (!activeSpanSet.has(i)) {
      const s = spans[i];
      s.el.classList.add('active');
      s.el.classList.remove('past');
      if (s.isLong) s.el.classList.add('long-word');
      // On a forward jump: mark everything before this span's line as past
      // (only do this if we're not in dead air after a seek — handled by seekToTime)
    }
  }
  activeSpanSet = newActiveSpans;

  // ── Lines: find ALL lines active right now ──
  const newActiveLines = new Set();
  for (let i = 0; i < lines.length; i++) {
    if (t >= lines[i].begin && t < lines[i].end) newActiveLines.add(i);
  }

  // Lines that just deactivated
  for (const i of activeLineSet) {
    if (!newActiveLines.has(i)) {
      lines[i].el.classList.remove('active-line');
    }
  }
  // Lines that just activated — add highlight and scroll to the first new one
  let scrollTarget = null;
  for (const i of newActiveLines) {
    if (!activeLineSet.has(i)) {
      lines[i].el.classList.add('active-line');
      if (scrollTarget === null) {
        const isAdlib = lines[i].el.classList.contains('adlib');
        // Don't scroll to an adlib line if there's at least one non-adlib line currently active
        const hasActiveNonAdlib = [...newActiveLines].some(
          j => j !== i && !lines[j].el.classList.contains('adlib')
        );
        if (!isAdlib || !hasActiveNonAdlib) {
          scrollTarget = lines[i].el;
        }
      }
    }
  }
  if (scrollTarget) {
    const container = document.getElementById('lyrics-container');
    const containerRect = container.getBoundingClientRect();
    const lineRect = scrollTarget.getBoundingClientRect();
    const offset = lineRect.top - containerRect.top - (container.clientHeight / 2) + (lineRect.height / 2);
    container.scrollTop += offset;
  }
  activeLineSet = newActiveLines;

  // ── Break bars: update fill for any bar whose window we're inside ──
  for (const bar of breakBars) {
    if (t >= bar.start && t <= bar.end) {
      const pct = ((t - bar.start) / bar.gap) * 100;
      bar.fillEl.style.width = pct.toFixed(2) + '%';
      bar.el.style.opacity = '1';
    } else if (t > bar.end) {
      bar.fillEl.style.width = '100%';
      bar.el.style.opacity = '0.3';
    } else {
      bar.fillEl.style.width = '0%';
      bar.el.style.opacity = '0.3';
    }
  }

  // Progress bar
  if (duration > 0) {
    document.getElementById('seek-bar').value = t;
    document.getElementById('current-time').textContent = formatTime(t);
  }

  rafId = requestAnimationFrame(syncLoop);
}

// ─── Web Audio API State ──────────────────────────────────────────────────────
let actx = null;
let audioBuffer = null;
let sourceNode = null;
let isPlaying = false;
let startedAt = 0;   // actx.currentTime when playback last started
let pausedAt = 0;    // playback offset when paused
let duration = 0;
let playGeneration = 0; // incremented each startPlayback; onended only acts if generation matches

function ensureContext() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}

function startPlayback(offset) {
  ensureContext();
  const gen = ++playGeneration;
  if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
  sourceNode = actx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(actx.destination);
  sourceNode.onended = () => {
    // Only act if this is still the active playback (not superseded by a seek/restart)
    if (gen !== playGeneration) return;
    if (isPlaying) {
      isPlaying = false;
      pausedAt = 0;
      playIcon.setAttribute('points', '4,2 14,8 4,14');
      cancelAnimationFrame(rafId);
      rafId = null;
      document.getElementById('seek-bar').value = 0;
      document.getElementById('current-time').textContent = '0:00';
      activeSpanSet = new Set();
      activeLineSet = new Set();
      spans.forEach(s => s.el.classList.remove('active', 'long-word', 'past'));
      lines.forEach(l => l.el.classList.remove('active-line'));
      breakBars.forEach(b => { b.fillEl.style.width = '0%'; b.el.style.opacity = '0.3'; });
    }
  };
  startedAt = actx.currentTime - offset;
  sourceNode.start(0, offset);
  isPlaying = true;
}

// ─── Upload Handlers ──────────────────────────────────────────────────────────
document.getElementById('ttml-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('ttml-hint').style.display = 'none';
  const nameEl = document.getElementById('ttml-name');
  nameEl.textContent = file.name;
  nameEl.style.display = 'block';

  const reader = new FileReader();
  reader.onload = (ev) => {
    parseTTML(ev.target.result);
    checkReady();
  };
  reader.readAsText(file);
});

document.getElementById('audio-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('audio-hint').style.display = 'none';
  const nameEl = document.getElementById('audio-name');
  nameEl.textContent = file.name;
  nameEl.style.display = 'block';

  // Show loading state
  document.getElementById('total-time').textContent = '…';

  const reader = new FileReader();
  reader.onload = async (ev) => {
    ensureContext();
    try {
      audioBuffer = await actx.decodeAudioData(ev.target.result);
      duration = audioBuffer.duration;
      document.getElementById('total-time').textContent = formatTime(duration);
      document.getElementById('seek-bar').max = duration;
      document.getElementById('seek-bar').step = 0.01;
      checkReady();
    } catch (err) {
      document.getElementById('total-time').textContent = 'ERR';
      console.error('Audio decode error:', err);
    }
  };
  reader.readAsArrayBuffer(file);
});

// Drag over styling
['ttml-drop','audio-drop'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', (e) => { e.preventDefault(); el.classList.remove('drag-over'); });
});

function checkReady() {
  const ready = spans.length > 0 && audioBuffer !== null;
  document.getElementById('btn-play').disabled = !ready;
  document.getElementById('seek-bar').disabled = !ready;
  document.getElementById('btn-render').disabled = !ready;
}

// ─── Playback Controls ────────────────────────────────────────────────────────
btnPlay.addEventListener('click', () => {
  if (!audioBuffer) return;
  if (!isPlaying) {
    startPlayback(pausedAt);
    playIcon.setAttribute('points', '4,2 8,2 8,14 4,14 M10,2 14,2 14,14 10,14');
    if (!rafId) syncLoop();
  } else {
    // Capture current playback position before stopping
    pausedAt = actx.currentTime - startedAt;
    isPlaying = false;
    try { sourceNode.stop(); } catch(e){}
    playIcon.setAttribute('points', '4,2 14,8 4,14');
    cancelAnimationFrame(rafId);
    rafId = null;
  }
});

document.getElementById('seek-bar').addEventListener('input', (e) => {
  seekToTime(parseFloat(e.target.value));
});

// ─── Video Renderer ───────────────────────────────────────────────────────────
let renderCancelled = false;

document.getElementById('render-cancel').addEventListener('click', () => {
  renderCancelled = true;
});

document.getElementById('btn-render').addEventListener('click', startRender);

async function startRender() {
  if (!audioBuffer || !spans.length) return;

  renderCancelled = false;
  const overlay = document.getElementById('render-overlay');
  const barFill = document.getElementById('render-bar-fill');
  const renderSub = document.getElementById('render-sub');
  overlay.classList.add('active');
  document.getElementById('btn-render').classList.add('rendering');

  const W = 1280, H = 720, FPS = 30;
  const FONT_SIZE = 38;
  const ADLIB_FONT_SIZE = 30;
  const LINE_HEIGHT = 80;       // increased padding between lines
  const ADLIB_LINE_HEIGHT = 60;
  const WRAPPED_EXTRA = 52;     // extra height per wrapped row beyond the first
  const ADLIB_WRAPPED_EXTRA = 42;
  const LEFT_PAD = 80;
  const RIGHT_PAD = 80;
  const MAX_TEXT_W = W - LEFT_PAD - RIGHT_PAD;
  const BG = '#0a0a0f';
  const COL_DIM = '#3a3a55';
  const COL_MID = '#6a6a9a';
  const COL_BRIGHT = '#c8c8e8';
  const COL_ACTIVE = '#e8f440';
  const COL_BORDER = '#1e1e2e';
  const JITTER_DUR = 0.060;
  // Scroll smoothing: lerp speed (higher = snappier, lower = smoother)
  const SCROLL_LERP = 4.0; // units: per second

  function easeOutExpo(t) { return 1 - Math.pow(1 - t, 3.5); }

  function getSpanY(span, t) {
    if (t < span.begin) return 2;
    if (t >= span.end) return 0;
    const elapsed = t - span.begin;
    const wordDur = span.end - span.begin;
    if (elapsed < JITTER_DUR) return 2 + 3 * (elapsed / JITTER_DUR);
    const p = Math.min((elapsed - JITTER_DUR) / Math.max(wordDur - JITTER_DUR, 0.001), 1);
    return 5 * (1 - easeOutExpo(p));
  }

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── Build ordered segment list from DOM (preserves spaces) ──
  function buildLineSegments(lineEl, lineSpans) {
    const segments = [];
    const spanByEl = new Map(lineSpans.map(s => [s.el, s]));
    function walk(node) {
      for (const child of node.childNodes) {
        if (child.nodeType === Node.TEXT_NODE) {
          if (child.textContent) segments.push({ span: null, text: child.textContent });
        } else if (child.classList && child.classList.contains('lyric-span')) {
          segments.push({ span: spanByEl.get(child), text: child.textContent });
        } else {
          walk(child);
        }
      }
    }
    walk(lineEl);
    return segments;
  }

  // ── Word-wrap segments into rows, never breaking within a word ──
  // Groups consecutive span segments (no whitespace between) into atomic units
  // before packing rows, so syllable-split words always stay together.
  function wrapSegments(segments, fontSize) {
    ctx.font = `${fontSize}px "DM Mono", monospace`;

    // Step 1: build atomic units — runs of adjacent spans = one unbreakable word
    const units = [];
    let i = 0;
    while (i < segments.length) {
      const seg = segments[i];
      if (seg.span === null) {
        const tw = ctx.measureText(seg.text).width;
        units.push({ segs: [{ ...seg, width: tw }], width: tw, isSpace: true });
        i++;
      } else {
        const run = [];
        let runW = 0;
        while (i < segments.length && segments[i].span !== null) {
          const tw = ctx.measureText(segments[i].text).width;
          run.push({ ...segments[i], width: tw });
          runW += tw;
          i++;
          // If this span's text ends with whitespace, it's a word boundary — end the run
          if (/\s$/.test(segments[i - 1].text)) break;
        }
        units.push({ segs: run, width: runW, isSpace: false });
      }
    }

    // Step 2: greedy row packing — break only on space units
    const rows = [];
    let currentRow = [];
    let currentW = 0;
    for (const unit of units) {
      if (currentRow.length === 0 && unit.isSpace) continue; // skip leading space on new row
      if (currentW + unit.width > MAX_TEXT_W && currentRow.length > 0) {
        rows.push(currentRow);
        currentRow = [];
        currentW = 0;
        if (unit.isSpace) continue;
      }
      for (const seg of unit.segs) currentRow.push(seg);
      currentW += unit.width;
    }
    if (currentRow.length > 0) rows.push(currentRow);
    return rows;
  }

  // ── Build layout with wrapped rows ──
  const layout = [];
  let curY = 0;
  ctx.font = `${FONT_SIZE}px "DM Mono", monospace`;

  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    const isAdlib = l.el.classList.contains('adlib');
    const agent = l.el.dataset.agent;
    const fs = isAdlib ? ADLIB_FONT_SIZE : FONT_SIZE;
    const lh = isAdlib ? ADLIB_LINE_HEIGHT : LINE_HEIGHT;
    const wExtra = isAdlib ? ADLIB_WRAPPED_EXTRA : WRAPPED_EXTRA;
    const lineSpans = spans.filter(s => s.lineEl === l.el);
    const segments = buildLineSegments(l.el, lineSpans);
    const rows = wrapSegments(segments, fs);
    const totalH = lh + (rows.length - 1) * wExtra;

    layout.push({ lineObj: l, y: curY, isAdlib, agent, fontSize: fs,
                  lineHeight: lh, wExtra, rows, totalH, i });
    curY += totalH;
    if (breakBars.some(b => b.start === l.end)) curY += 56;
  }

  const creditEl = document.querySelector('.songwriter-credit');
  const creditText = creditEl ? creditEl.textContent : null;

  // ── Audio + MediaRecorder ──
  const canvasStream = canvas.captureStream(FPS);
  const renderACtx = new AudioContext();
  const dest = renderACtx.createMediaStreamDestination();
  const audioSource = renderACtx.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.connect(dest);

  const combinedStream = new MediaStream([
    ...canvasStream.getVideoTracks(),
    ...dest.stream.getAudioTracks()
  ]);

  const mimeTypes = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
  const mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
  const recorder = new MediaRecorder(combinedStream, { mimeType, videoBitsPerSecond: 8_000_000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  recorder.start(100);
  audioSource.start(0);
  const audioStartTime = renderACtx.currentTime;

  // ── Scroll logic ──
  // SCROLL_ARRIVE: approx seconds for lerp to reach 95% of target (k=4 → ~0.75s)
  const SCROLL_ARRIVE = 0.75;
  const CENTER_Y = H / 2 - 20;

  function getScrollStartTime(entryIdx) {
    if (entryIdx <= 0) return 0;
    const prevEnd = layout[entryIdx - 1].lineObj.end;
    const thisBegin = layout[entryIdx].lineObj.begin;
    const gap = thisBegin - prevEnd;
    // If gap is long enough to scroll during it, start scrolling SCROLL_ARRIVE before target
    return gap > SCROLL_ARRIVE ? thisBegin - SCROLL_ARRIVE : thisBegin;
  }

  function getAnchorEntry(t) {
    // 1. Active non-adlib line wins
    for (const entry of layout) {
      const l = entry.lineObj;
      if (t >= l.begin && t < l.end && !entry.isAdlib) return entry;
    }
    // 2. Active adlib-only
    for (const entry of layout) {
      const l = entry.lineObj;
      if (t >= l.begin && t < l.end) return entry;
    }
    // 3. In a gap — check if we should be scrolling toward the next line
    for (let i = 0; i < layout.length; i++) {
      if (layout[i].lineObj.begin > t) {
        if (t >= getScrollStartTime(i)) return layout[i];
        break; // not yet time to scroll; fall through to last-past
      }
    }
    // 4. Last past line
    for (let i = layout.length - 1; i >= 0; i--) {
      if (layout[i].lineObj.end <= t) return layout[i];
    }
    return layout.length > 0 ? layout[0] : null;
  }

  function getTargetOffset(t) {
    const anchor = getAnchorEntry(t);
    if (!anchor) return layout.length > 0 ? (layout[0].y + layout[0].totalH / 2 - CENTER_Y) : 0;
    return anchor.y + anchor.totalH / 2 - CENTER_Y;
  }

  // Initialize scroll anchored to the very first line (not mid-screen void)
  const firstOffset = layout.length > 0 ? (layout[0].y + layout[0].totalH / 2 - CENTER_Y) : 0;
  let currentViewOffsetY = firstOffset;
  let lastFrameWallTime = performance.now();

  function drawFrame(t, viewOffsetY) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    for (const entry of layout) {
      const entryTop = entry.y - viewOffsetY;
      if (entryTop + entry.totalH < -10 || entryTop > H + 10) continue;

      const l = entry.lineObj;
      const isActive = t >= l.begin && t < l.end;
      const isPastLine = l.end <= t;
      const isRight = entry.agent === 'v2';

      ctx.font = `${entry.fontSize}px "DM Mono", monospace`;
      ctx.textBaseline = 'alphabetic';
      ctx.globalAlpha = entry.isAdlib ? 0.6 : 1.0;

      let rowY = entryTop;
      for (const row of entry.rows) {
        const rowW = row.reduce((s, seg) => s + seg.width, 0);
        let xCursor = isRight ? (W - RIGHT_PAD - rowW) : LEFT_PAD;

        for (const seg of row) {
          if (!seg.span) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = isPastLine ? COL_BRIGHT : (isActive ? COL_MID : COL_DIM);
            ctx.fillText(seg.text, xCursor, rowY + entry.fontSize + 2);
          } else {
            const s = seg.span;
            const spanActive = t >= s.begin && t < s.end;
            const spanPast = s.end <= t;
            const ty = getSpanY(s, t);
            ctx.fillStyle = spanActive ? COL_ACTIVE
                          : spanPast ? COL_BRIGHT
                          : (isPastLine || isActive) ? COL_MID
                          : COL_DIM;
            ctx.shadowColor = COL_ACTIVE;
            ctx.shadowBlur = spanActive ? 18 : 0;
            ctx.fillText(seg.text, xCursor, rowY + entry.fontSize + ty);
          }
          xCursor += seg.width;
        }
        rowY += entry.wExtra;
      }

      ctx.globalAlpha = 1.0;
      ctx.shadowBlur = 0;

      // Break bar
      const nextEntry = layout[entry.i + 1];
      if (nextEntry) {
        const gap = nextEntry.lineObj.begin - l.end;
        if (gap >= 5) {
          const barY = entry.y + entry.totalH - viewOffsetY + 18;
          const barW = MAX_TEXT_W * 0.5;
          ctx.fillStyle = COL_BORDER;
          ctx.fillRect(LEFT_PAD, barY, barW, 2);
          if (t > l.end && t < nextEntry.lineObj.begin) {
            ctx.fillStyle = COL_ACTIVE;
            ctx.fillRect(LEFT_PAD, barY, barW * ((t - l.end) / gap), 2);
          } else if (t >= nextEntry.lineObj.begin) {
            ctx.fillStyle = COL_ACTIVE;
            ctx.fillRect(LEFT_PAD, barY, barW, 2);
          }
          ctx.globalAlpha = 0.4;
          ctx.font = `11px "DM Mono", monospace`;
          ctx.fillStyle = COL_BRIGHT;
          ctx.fillText(Math.round(gap) + 's', LEFT_PAD + barW + 8, barY + 2);
          ctx.globalAlpha = 1.0;
        }
      }
    }

    if (creditText) {
      const lastEntry = layout[layout.length - 1];
      const lastDrawY = lastEntry ? (lastEntry.y + lastEntry.totalH - viewOffsetY) : H - 60;
      if (lastDrawY + 60 > 0 && lastDrawY < H) {
        ctx.globalAlpha = 0.4;
        ctx.font = `14px "DM Mono", monospace`;
        ctx.fillStyle = COL_BRIGHT;
        // Word-wrap the credit text
        const creditWords = creditText.split(' ');
        let creditLine = '';
        let creditY = lastDrawY + 40;
        for (const word of creditWords) {
          const test = creditLine ? creditLine + ' ' + word : word;
          if (ctx.measureText(test).width > MAX_TEXT_W && creditLine) {
            ctx.fillText(creditLine, LEFT_PAD, creditY);
            creditLine = word;
            creditY += 20;
          } else {
            creditLine = test;
          }
        }
        if (creditLine) ctx.fillText(creditLine, LEFT_PAD, creditY);
        ctx.globalAlpha = 1.0;
      }
    }
  }

  // ── Freeze-proof render loop ──
  let lastDrawnT = -1;

  function doRenderTick() {
    if (renderCancelled) return;
    const now = performance.now();
    const wallDelta = (now - lastFrameWallTime) / 1000;
    lastFrameWallTime = now;

    const t = Math.max(renderACtx.currentTime - audioStartTime, 0);

    if (t > duration + 0.5) {
      recorder.stop();
      try { audioSource.stop(); } catch(e){}
      renderACtx.close();
      clearInterval(intervalId);
      return;
    }

    // Smooth scroll: lerp currentViewOffsetY toward target
    const targetOffset = getTargetOffset(t);
    const lerpFactor = 1 - Math.exp(-SCROLL_LERP * wallDelta);
    currentViewOffsetY += (targetOffset - currentViewOffsetY) * lerpFactor;

    drawFrame(t, currentViewOffsetY);
    lastDrawnT = t;

    const pct = Math.min((t / duration) * 100, 100);
    barFill.style.width = pct.toFixed(1) + '%';
    renderSub.textContent = formatTime(t) + ' / ' + formatTime(duration);
  }

  // Heartbeat interval: fires every frame even when RAF is suppressed
  const intervalId = setInterval(doRenderTick, 1000 / FPS);

  // RAF layer on top for smoother output when the tab is active
  function rafLoop() {
    if (renderCancelled) { clearInterval(intervalId); return; }
    if (renderACtx.currentTime - audioStartTime <= duration + 0.5) {
      doRenderTick();
      requestAnimationFrame(rafLoop);
    }
  }
  requestAnimationFrame(rafLoop);

  recorder.onstop = () => {
    clearInterval(intervalId);
    overlay.classList.remove('active');
    document.getElementById('btn-render').classList.remove('rendering');
    if (!renderCancelled) {
      const blob = new Blob(chunks, { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'lyrics-video.webm';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    }
  };
}
</script>
