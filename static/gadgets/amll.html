<html>
  <head>
    <title>Lyric Word Sync Tools</title>
    <!--Mainly for Genius.com scribes to AMLL but who's keeping score?-->
    <style>
      body {
        font-family: -apple-system, system-ui, "Segoe UI", Helvetica, Arial,
          sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        background-color: #1a1a1a;
        color: #f4f4f4;
        line-height: 1.8;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      textarea {
        width: 100%;
        height: 60%;
        display: block;
        text-align: center;
        background: #333;
        color: white;
        font-family: -apple-system, system-ui, "Segoe UI", Helvetica, Arial,
          sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        border-radius: 12px;
        margin-bottom: 1%;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      button {
        appearance: none;
        background-color: #2ea44f;
        border: 1px solid rgba(27, 31, 35, 0.15);
        border-radius: 6px;
        box-shadow: rgba(27, 31, 35, 0.1) 0 1px 0;
        box-sizing: border-box;
        color: #fff;
        cursor: pointer;
        display: inline-block;
        font-family: -apple-system, system-ui, "Segoe UI", Helvetica, Arial,
          sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        font-size: 14px;
        font-weight: 400;
        line-height: 20px;
        padding: 6px 16px;
        position: relative;
        transition: 0.15s;
        text-align: center;
        text-decoration: none;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        vertical-align: middle;
        white-space: nowrap;
        width: 100%;
        margin-bottom: 1%;
      }

      button:focus:not(:focus-visible):not(.focus-visible) {
        box-shadow: none;
        outline: none;
      }
      button:hover {
        background-color: #2c974b;
        font-weight: 600;
      }
      button:focus {
        box-shadow: rgba(46, 164, 79, 0.4) 0 0 0 3px;
        outline: none;
        font-weight: 600;
      }
      button:active {
        background-color: #298e46;
        transform: translateY(2px);
        box-shadow: rgba(20, 70, 32, 0.2) 0 1px 0 inset;
      }
      button:disabled {
        background-color: gray;
        cursor: not-allowed;
        opacity: 60%;
      }

      .container {
        width: 80%;
      }
    </style>
    <script>
      function formatLyrics(lyrics) {   
          function capitalizeFirstLetter(str) {
              return str.charAt(0).toUpperCase() + str.slice(1);
          }

          return lyrics
            .split("\n") // Split into lines
            .filter((line) => line.trim() !== "" && !/^\[.*\]$/.test(line.trim())) // Remove empty lines and bracketed sections
            .reduce((formatted, line) => {
              line = line.replace(/\bnigga(s|)\b/gi, (match) =>
                censorWord(match)
              );

              function censorWord(word) {
                return word;
                const replacement = word.length === 6 ? "n*****" : "n****"; // Match censored length
                return word[0] === word[0].toUpperCase()
                  ? replacement.charAt(0).toUpperCase() + replacement.slice(1)
                  : replacement;
              } // Censor N-word Apple Music style

              const adlibMatches = [...line.matchAll(/\((.*?)\)/g)];
              if (adlibMatches.length > 0) {
                let mainLine = line.replace(/\s*\(.*?\)/g, "").trim(); // Remove adlibs without leaving extra spaces
                let adlibs = adlibMatches
                  .map((match) => match[1].trim())
                  .map((adlib, index, arr) => {
                    if (index > 0) {
                      const prevAdlib = arr[index - 1];
                      if (!prevAdlib.endsWith("!") && !prevAdlib.endsWith("?")) {
                        return ", " + adlib.toLowerCase(); // Add comma and lowercase unless preceded by ? or !
                      }
                    }
                    return " " + adlib; // No comma before adlibs after ? or !
                  })
                  .join("")
                  .trim(); // Join without unnecessary spaces
                if (mainLine) formatted.push(capitalizeFirstLetter(mainLine));
                formatted.push("<" + capitalizeFirstLetter(adlibs));
              } else {
                formatted.push(capitalizeFirstLetter(line.trim()));
              }
              return formatted;
            }, []);
      }
      
      function splitLyrics(lyrics) {
        return lyrics
        .split("\n")
        .filter((line) => line.trim() !== "" && !/^\[.*\]$/.test(line.trim()))
        .reduce((formatted, line) => {
          formatted.push(line.replace(/( +)/g,(x) => `\\${x}\\`)
                         .replaceAll("-","-\\")
                         .replaceAll("\\\\","\\"));
          
          return formatted;
        }, []);
      }

      function checkForEligibility(text) {
        const disabledCalc = text === "" ? true : false;
        document.querySelectorAll("button").forEach((button) => {
          button.disabled = disabledCalc;
        });
      }
    </script>
  </head>
  <body>
    <div class="container">
      <textarea
        oninput="checkForEligibility(this.value)"
        id="lyrics"
      ></textarea>
      <button
        disabled
        onclick="document.getElementById('lyrics').value = formatLyrics(document.getElementById('lyrics').value).join('\n')"
      >
        Format Lyrics for AMLL
      </button>
      <button
        disabled
        onclick="document.getElementById('lyrics').value = splitLyrics(document.getElementById('lyrics').value).join('\n')"
      >
        Split Words (Special)
      </button>
    </div>
  </body>
</html>
